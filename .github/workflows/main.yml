name: دانلود و ذخیره فایل (تشخیص خودکار اسم)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل رو اینجا بچسبون'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: دانلود فایل و تنظیم اسم خروجی
        run: |
          # اسم فایل رو از لینک استخراج کن
          FILENAME=$(basename "${{ github.event.inputs.download_url }}")
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV
          
          # فایل رو با اسم درست دانلود کن
          wget "${{ github.event.inputs.download_url }}" -O "$FILENAME"
          echo "فایل با اسم $FILENAME دانلود شد."

      - name: ذخیره فایل در مخزن
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'دانلود و اضافه کردن فایل جدید'
          file_pattern: ${{ env.FILE_NAME }}

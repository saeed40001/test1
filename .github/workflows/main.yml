name: دانلود و ذخیره مستقیم

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل رو اینجا بچسبون'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دانلود فایل
        run: wget "${{ github.event.inputs.download_url }}" -O downloaded_file

      - name: ذخیره فایل
        uses: actions/upload-artifact@v4
        with:
          name: MyDownloadedFile
          path: downloaded_file

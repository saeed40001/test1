name: دانلود و ذخیره در مخزن

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل رو اینجا بچسبون'
        required: true
      file_name:
        description: 'اسم فایل خروجی (مثلاً myfile.zip)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: دانلود فایل
        run: wget -O "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.download_url }}"

      - name: ذخیره فایل در مخزن
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.file_name }}"
          git commit -m "Add downloaded file"
          git push

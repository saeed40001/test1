name: دانلود و ذخیره فایل (روش استاندارد)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل رو اینجا بچسبون'
        required: true
      file_name:
        description: 'اسم فایل خروجی (مثلاً myfile.zip)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: دانلود فایل از لینک
        run: |
          wget "${{ github.event.inputs.download_url }}" -O "${{ github.event.inputs.file_name }}"
          echo "فایل دانلود شد."

      - name: ذخیره فایل در مخزن
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'دانلود و اضافه کردن فایل جدید'
          file_pattern: ${{ github.event.inputs.file_name }}

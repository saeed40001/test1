name: دانلود فایل

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت فایل از اینترنت
        run: |
          wget "${{ github.event.inputs.download_url }}" -O myfile
          echo "دانلود تمام شد."

      - name: ذخیره فایل در مخزن
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'myfile'
          commit_message: 'فایل جدید اضافه شد'

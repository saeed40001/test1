name: Download and Commit File

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and get original filename
        run: |
          # دانلود فایل و استخراج اسمش از هدر HTTP
          wget --content-disposition "${{ github.event.inputs.file_url }}" -P .
          
          # اگه wget نتونست اسم رو تشخیص بده، از خود لینک استخراج کن
          if [ ! -f "$(basename "${{ github.event.inputs.file_url }}")" ]; then
            curl -L -O "${{ github.event.inputs.file_url }}"
          fi
        working-directory: ${{ github.workspace }}

      - name: Commit and push file
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          # اضافه کردن همه فایل‌های جدید
          git add -A
          git commit -m "Download and add file from ${{ github.event.inputs.file_url }}"
          git push

name: Download and Commit File

# این بخش تعیین میکند که اکشن چطور شروع شود
on:
  workflow_dispatch: # با این دستور میتوانید اکشن را به صورت دستی از تب Actions اجرا کنید
    inputs:
      file_url:
        description: 'لینک فایلی که میخواهید دانلود شود'
        required: true
        type: string
      file_name:
        description: 'نام فایل نهایی ذخیره شده (مثلاً data.json)'
        required: true
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      # مرحله ۱: دریافت کدهای مخزن
      - name: Checkout repository
        uses: actions/checkout@v4

      # مرحله ۲: دانلود فایل از لینک ورودی
      - name: Download file from URL
        run: curl -L -o "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_url }}"

      # مرحله ۳: افزودن و ثبت تغییرات در گیت
      - name: Commit and push file to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.file_name }}"
          git commit -m "Add downloaded file: ${{ github.event.inputs.file_name }}" || echo "No changes to commit"
          git push

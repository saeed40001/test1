name: دانلود و ذخیره در مخزن

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل رو اینجا بچسبون'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت فایل از اینترنت
        run: |
          wget "${{ github.event.inputs.download_url }}" -O myfile
          echo "دانلود تمام شد."

      - name: ذخیره فایل در مخزن
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # کلید حل مشکل: اول مخزن را clone کن، بعد فایل را بچسبان، بعد push کن
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          cp ../myfile .
          git add myfile
          git commit -m "Add downloaded file"
          git push

name: دانلود و ذخیره در مخزن

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل رو اینجا بچسبون'
        required: true
      file_name:
        description: 'اسم فایل خروجی (مثلاً myfile.zip)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: دانلود و آپلود مستقیم فایل
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # دانلود فایل
          wget -O "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.download_url }}"
          
          # تبدیل فایل به Base64
          CONTENT=$(base64 -w 0 "${{ github.event.inputs.file_name }}")
          
          # آپلود مستقیم با API گیت‌هاب
          curl -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.file_name }} \
            -d "{\"message\":\"Add file\",\"content\":\"$CONTENT\"}"

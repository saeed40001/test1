name: Download and Commit File

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک فایل برای دانلود'
        required: true
        type: string
      file_name:
        description: 'نام فایل ذخیره شده'
        required: true
        type: string

# مجوز نوشتن روی مخزن (رفع خطای 128)
permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file
        run: curl -L -o "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_url }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add ${{ github.event.inputs.file_name }}"
          file_pattern: "${{ github.event.inputs.file_name }}"

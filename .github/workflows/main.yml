name: دانلود ساده

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم فایل'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: مرحله صفر: خواندن مخزن
        uses: actions/checkout@v4

      - name: مرحله یک: دانلود فایل
        run: wget "${{ github.event.inputs.download_url }}" -O myfile

      - name: مرحله دو: اضافه کردن به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add myfile
          git commit -m "Add file"
          git push
